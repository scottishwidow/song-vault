services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: song_vault
      POSTGRES_USER: song_vault
      POSTGRES_PASSWORD: song_vault
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U song_vault -d song_vault"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
