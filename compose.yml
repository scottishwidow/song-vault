services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: song_vault
      POSTGRES_USER: song_vault
      POSTGRES_PASSWORD: song_vault
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U song_vault -d song_vault"]
      interval: 5s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: songvault
      MINIO_ROOT_PASSWORD: songvaultsecret
    volumes:
      - minio-data:/data
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 1; done &&
      mc mb --ignore-existing local/song-vault-charts
      "
    environment:
      MINIO_ROOT_USER: songvault
      MINIO_ROOT_PASSWORD: songvaultsecret
    restart: "no"
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: song-vault:local
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://song_vault:song_vault@db:5432/song_vault
      CHART_STORAGE_ENDPOINT_URL: http://minio:9000
      CHART_STORAGE_BUCKET: song-vault-charts
      CHART_STORAGE_ACCESS_KEY_ID: songvault
      CHART_STORAGE_SECRET_ACCESS_KEY: songvaultsecret
      CHART_STORAGE_USE_SSL: "false"
      CHART_STORAGE_FORCE_PATH_STYLE: "true"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
